manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
    - name: dmhuisma
      url-base: https://github.com/dmhuisma
    - name: AYM1607
      url-base: https://github.com/AYM1607
    - name: nuovotaka
      url-base: https://github.com/nuovotaka
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-driver-azoteq-iqs5xx
      remote: AYM1607
      revision: main
    - name: nice-view-battery-peripheral
      remote: dmhuisma
      revision: zmk_0.4
    - name: zmk_arbitrary_split_data_channel
      remote: dmhuisma
      revision: main
    - name: zmk-split-status-relay
      remote: dmhuisma
      revision: main
    - name: zmk-pointing-acceleration-alpha
      remote: nuovotaka
      revision: main
  self:
    path: config
